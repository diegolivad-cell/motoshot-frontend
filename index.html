<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MotoShot GT</title>
    <meta property="og:title" content="MotoShot GT" />
    <meta property="og:description" content="Fotografía de rodadas en Guatemala · Comprá tus fotos en alta resolución" />
    <meta property="og:image" content="https://res.cloudinary.com/dleh0nhse/image/upload/v1780016874/MOTOSHOT_BANNER_TEST.png_fdyg0x.png" />
    <meta property="og:type" content="website" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#ff6b00" />
    <meta name="color-scheme" content="dark" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MotoShot GT" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preload" as="image" href="/favicon.png" />
    <link rel="preload" as="image" href="/rogue-dev-labs-logo.png" />
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0c0c0c;
        opacity: 1;
        transition: opacity 0.65s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #app-splash.app-splash--out {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash .app-splash-center {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
      }
      #app-splash .app-splash-inner {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: app-splash-in 0.9s cubic-bezier(0.4, 0, 0.2, 1) both;
      }
      #app-splash .app-splash-glow {
        position: absolute;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 107, 0, 0.42) 0%, transparent 72%);
        animation: app-splash-glow 2.4s ease-in-out infinite;
      }
      #app-splash .app-splash-inner img {
        position: relative;
        z-index: 1;
        width: 96px;
        height: 96px;
        object-fit: contain;
      }
      #app-splash .app-splash-footer {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding-bottom: max(28px, env(safe-area-inset-bottom, 0px));
        gap: 2px;
      }
      #app-splash .app-splash-rdl-logo {
        width: 40px;
        height: 40px;
        object-fit: contain;
        margin-bottom: 4px;
      }
      #app-splash .app-splash-from {
        font-size: 11px;
        color: #888;
        font-family: system-ui, -apple-system, sans-serif;
        letter-spacing: 0.02em;
      }
      #app-splash .app-splash-rdl-name {
        font-size: 13px;
        font-weight: 700;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
      }
      @keyframes app-splash-in {
        from { opacity: 0; transform: scale(0.88); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes app-splash-glow {
        0%, 100% { opacity: 0.35; transform: scale(1); }
        50% { opacity: 0.65; transform: scale(1.12); }
      }
    </style>
    <script>window.__MOTOSHOT_SPLASH_START__ = Date.now();</script>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <div class="app-splash-center">
        <div class="app-splash-inner">
          <div class="app-splash-glow"></div>
          <img src="/favicon.png" alt="" width="96" height="96" />
        </div>
      </div>
      <div class="app-splash-footer">
        <img class="app-splash-rdl-logo" src="/rogue-dev-labs-logo.png" alt="" width="40" height="40" />
        <div class="app-splash-from">from</div>
        <div class="app-splash-rdl-name">Rogue Dev Labs</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
