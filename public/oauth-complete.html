<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MotoShot GT</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        background: #0c0c0c;
        color: #fff;
        font-family: system-ui, sans-serif;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
      }
      p {
        margin: 0;
        color: #ff6b00;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/favicon.png" alt="" width="72" height="72" />
    <p id="status">Volviendo a MotoShot GT...</p>
    <script>
      (function () {
        var q = location.search || "?oauth=google";
        var status = document.getElementById("status");
        var deep = "com.motoshotgt.app://oauth-complete" + q;

        function returnToApp() {
          try {
            location.replace(deep);
          } catch (e) {
            /* ignore */
          }
        }

        if (status) status.textContent = "Volviendo a MotoShot GT...";
        returnToApp();
        setTimeout(returnToApp, 400);
        setTimeout(returnToApp, 1200);
      })();
    </script>
  </body>
</html>
