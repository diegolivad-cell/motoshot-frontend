<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MotoShot GT</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #0c0c0c;
        color: #fff;
        font-family: system-ui, sans-serif;
      }
      .logo {
        width: 72px;
        height: 72px;
      }
      p {
        margin: 0;
        color: #ff6b00;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/favicon.png" alt="" width="72" height="72" />
    <p id="status">Confirmando tu pago...</p>
    <script>
      (function () {
        var q = location.search;
        var params = new URLSearchParams(q || "");
        var isCancel = params.get("payment_cancel") === "true";
        var status = document.getElementById("status");
        if (status) {
          status.textContent = isCancel ? "Pago cancelado..." : "Confirmando tu pago...";
        }
        if (!q) q = "?payment_return=true";
        var ua = navigator.userAgent || "";
        var isAndroid = /Android/i.test(ua);

        if (isAndroid) {
          var deep = "com.motoshotgt.app://payment-complete" + q;
          var intent =
            "intent://motoshot.pro/payment-complete" +
            q +
            "#Intent;scheme=https;package=com.motoshotgt.app;S.browser_fallback_url=" +
            encodeURIComponent("https://motoshot.pro/" + q) +
            ";end";
          try {
            location.replace(deep);
          } catch (e) {
            /* ignore */
          }
          setTimeout(function () {
            location.replace(intent);
          }, 300);
          return;
        }

        location.replace("/" + q);
      })();
    </script>
  </body>
</html>
