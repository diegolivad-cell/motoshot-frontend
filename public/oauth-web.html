  <body>
    Completando inicio con Google...
    <script>
      (function () {
        var q = location.search || "?oauth=google";
        var params = new URLSearchParams(q);
        if (params.get("error") === "access_denied") {
          location.replace("/?oauth=google&error=access_denied");
          return;
        }
        location.replace("/" + q);
      })();
    </script>
  </body>
